# Drop this inside the `server { ... }` block of the domain you've
# pointed at this server (the one that already terminates SSL).
# Reload with `nginx -t && nginx -s reload`.
#
# Three public surfaces:
#   GET /school/calendar.ics?token=...     — the ICS feed iOS Calendar subscribes to
#   GET /school/healthz                    — for uptime monitoring
#   GET /school/debug/recent               — last 20 seen items as JSON
#
# Everything proxies to the Go service on the loopback at 127.0.0.1:8080.

location /school/ {
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # iOS Calendar can be patient; the Go side answers fast in normal
    # conditions, but keep the timeouts comfortable.
    proxy_connect_timeout 5s;
    proxy_send_timeout    15s;
    proxy_read_timeout    15s;

    # Honour the ETag the Go handler emits so iOS Calendar can 304.
    proxy_set_header If-None-Match $http_if_none_match;
}
